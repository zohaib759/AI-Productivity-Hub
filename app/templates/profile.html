{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2>My Profile</h2>

            <hr>

            <h5>Username</h5>

            <p>{{ user.username }}</p>

            <h5>Email</h5>

            <p>{{ user.email }}</p>

            <a href="{{ url_for('profile.edit_profile') }}"
               class="btn btn-primary">

                Edit Profile

            </a>
            <a href="{{ url_for('profile.change_password') }}"
               class="btn btn-warning">

                Change Password

        </div>

    </div>

</div>

{% endblock %}
