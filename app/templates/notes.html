{% extends "base.html" %}

{% block title %}My Notes{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📝 My Notes</h2>

        <a href="{{ url_for('notes.create_note') }}" class="btn btn-primary">
            + Create Note
        </a>
    </div>

    {% if notes %}

        {% for note in notes %}

        <div class="card shadow mb-3">

            <div class="card-body">

                <h4>{{ note.title }}</h4>

                <p>{{ note.content }}</p>

                <a href="{{ url_for('notes.edit_note', id=note.id) }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="{{ url_for('notes.delete_note', id=note.id) }}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

                <!-- AI Button -->

                <button
                    class="btn btn-info btn-sm summarize-btn"
                    data-content="{{ note.content|e }}">

                    ✨ Summarize

                </button>

                <!-- AI Result -->

                <div class="summary-result mt-3"></div>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">

            No notes yet.

        </div>

    {% endif %}

</div>

{% endblock %}
